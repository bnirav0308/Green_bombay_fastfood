<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PFZ — Menu</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #fff8f0;
            --red: #c0392b;
            --green: #27ae60;
            --blue: #2980b9;
            --orange: #e67e22;
            --purple: #8e44ad;
            --pink: #e91e8c;
            --dark: #1a1a1a;
            --card: #ffffff;
            --muted: #888;
            --shadow: 0 4px 20px rgba(0,0,0,0.08);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--bg);
            font-family: 'Poppins', sans-serif;
            color: var(--dark);
            padding-bottom: 100px;
        }

        /* ── HEADER ── */
        .header {
            background: linear-gradient(135deg, #1a0000 0%, #3d0000 50%, #1a0000 100%);
            padding: 30px 20px 24px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

            .header::before {
                content: '';
                position: absolute;
                inset: 0;
                background: radial-gradient(circle at 50% 0%, rgba(255,80,0,0.25) 0%, transparent 70%);
            }

        .logo-ring {
            width: 120px;
            height: 120px;
            border-radius: 20px;
            margin: 0 auto 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            z-index: 1;
            overflow: hidden;
            box-shadow: 0 0 30px rgba(255,100,0,0.5), 0 0 60px rgba(255,0,64,0.2);
        }

            .logo-ring img {
                width: 100%;
                height: 100%;
                object-fit: contain;
            }

        .shop-name {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 42px;
            color: white;
            letter-spacing: 6px;
            position: relative;
            z-index: 1;
            text-shadow: 0 0 20px rgba(255,100,0,0.8);
        }

        .shop-tagline {
            color: rgba(255,255,255,0.6);
            font-size: 12px;
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-top: 4px;
            position: relative;
            z-index: 1;
        }

        /* ── SEARCH ── */
        .search-wrap {
            padding: 16px;
            background: white;
            box-shadow: var(--shadow);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .search-inner {
            display: flex;
            align-items: center;
            background: #f5f5f5;
            border-radius: 12px;
            padding: 10px 16px;
            gap: 10px;
        }

            .search-inner span {
                font-size: 18px;
            }

            .search-inner input {
                border: none;
                background: transparent;
                font-family: 'Poppins', sans-serif;
                font-size: 14px;
                color: var(--dark);
                outline: none;
                width: 100%;
            }

                .search-inner input::placeholder {
                    color: #bbb;
                }

        /* ── CATEGORY PILLS ── */
        .cat-scroll {
            display: flex;
            gap: 8px;
            padding: 14px 16px;
            overflow-x: auto;
            scrollbar-width: none;
            background: white;
            border-bottom: 1px solid #f0f0f0;
        }

            .cat-scroll::-webkit-scrollbar {
                display: none;
            }

        .cat-pill {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 7px 16px;
            border-radius: 30px;
            border: 2px solid #eee;
            background: white;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            white-space: nowrap;
            font-family: 'Poppins', sans-serif;
            transition: all 0.2s;
            color: #555;
            flex-shrink: 0;
        }

            .cat-pill.active {
                color: white;
                border-color: transparent;
            }

            .cat-pill .dot {
                width: 8px;
                height: 8px;
                border-radius: 50%;
                background: currentColor;
                opacity: 0.6;
            }

        /* ── SECTION ── */
        .section {
            padding: 20px 16px 8px;
        }

        .section-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 14px;
            padding: 10px 16px;
            border-radius: 12px;
            color: white;
            font-family: 'Bebas Neue', sans-serif;
            font-size: 20px;
            letter-spacing: 2px;
        }

            .section-header .s-emoji {
                font-size: 22px;
            }

        /* ── ITEM CARD ── */
        .item-card {
            background: white;
            border-radius: 14px;
            padding: 14px 16px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: var(--shadow);
            border: 1px solid #f5f5f5;
            transition: transform 0.15s;
        }

            .item-card:active {
                transform: scale(0.98);
            }

        .item-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .item-emoji-box {
            width: 46px;
            height: 46px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            flex-shrink: 0;
        }

        .item-name {
            font-size: 14px;
            font-weight: 600;
            color: var(--dark);
            line-height: 1.3;
        }

        .item-price {
            font-size: 13px;
            font-weight: 700;
            margin-top: 2px;
        }

        .item-right {
            display: flex;
            align-items: center;
            gap: 6px;
            flex-shrink: 0;
        }

        .add-btn {
            width: 34px;
            height: 34px;
            border-radius: 10px;
            border: none;
            color: white;
            font-size: 20px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            line-height: 1;
            font-family: 'Poppins', sans-serif;
            transition: opacity 0.15s;
        }

            .add-btn:active {
                opacity: 0.8;
            }

        .qty-wrap {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .qty-btn {
            width: 30px;
            height: 30px;
            border-radius: 8px;
            border: 2px solid #eee;
            background: white;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Poppins', sans-serif;
            color: var(--dark);
        }

        .qty-num {
            font-size: 15px;
            font-weight: 700;
            min-width: 20px;
            text-align: center;
        }

        /* ── CART BAR ── */
        .cart-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(135deg, #c0392b, #e74c3c);
            padding: 14px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transform: translateY(100%);
            transition: transform 0.35s cubic-bezier(0.34,1.4,0.64,1);
            z-index: 200;
            box-shadow: 0 -4px 30px rgba(192,57,43,0.4);
        }

            .cart-bar.visible {
                transform: translateY(0);
            }

        .cb-left {
            display: flex;
            flex-direction: column;
        }

        .cb-count {
            font-size: 11px;
            color: rgba(255,255,255,0.8);
            font-weight: 500;
        }

        .cb-total {
            font-size: 22px;
            font-weight: 800;
            color: white;
        }

        .cb-btn {
            background: white;
            color: var(--red);
            border: none;
            padding: 11px 22px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            font-family: 'Poppins', sans-serif;
        }

        /* ── DRAWER ── */
        .overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            z-index: 300;
            display: none;
            backdrop-filter: blur(3px);
        }

            .overlay.show {
                display: block;
            }

        .drawer {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: white;
            border-radius: 24px 24px 0 0;
            max-height: 85vh;
            overflow-y: auto;
            z-index: 400;
            transform: translateY(100%);
            transition: transform 0.35s cubic-bezier(0.34,1.2,0.64,1);
            padding-bottom: 30px;
        }

            .drawer.open {
                transform: translateY(0);
            }

        .drawer-handle {
            width: 40px;
            height: 4px;
            background: #ddd;
            border-radius: 4px;
            margin: 14px auto 0;
        }

        .drawer-head {
            padding: 16px 20px;
            font-size: 20px;
            font-weight: 800;
            border-bottom: 1px solid #f0f0f0;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .cart-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 20px;
            border-bottom: 1px solid #f8f8f8;
        }

        .cr-left {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .cr-emoji {
            font-size: 28px;
        }

        .cr-name {
            font-size: 14px;
            font-weight: 600;
        }

        .cr-price {
            font-size: 12px;
            color: var(--muted);
            margin-top: 2px;
        }

        .cr-right {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .cr-qty-btn {
            width: 28px;
            height: 28px;
            border-radius: 8px;
            border: 1px solid #eee;
            background: #f8f8f8;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            font-family: 'Poppins', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .cr-sub {
            font-weight: 700;
            font-size: 14px;
            color: var(--red);
            min-width: 50px;
            text-align: right;
        }

        .bill-box {
            margin: 14px 20px 0;
            background: #fff8f0;
            border-radius: 14px;
            padding: 16px;
            border: 1px solid #ffe0c0;
        }

        .bill-row {
            display: flex;
            justify-content: space-between;
            font-size: 14px;
            margin-bottom: 8px;
            color: #555;
        }

            .bill-row.total {
                font-size: 18px;
                font-weight: 800;
                color: var(--dark);
                border-top: 1px dashed #ddd;
                padding-top: 10px;
                margin-top: 6px;
                margin-bottom: 0;
            }

        .note-box {
            margin: 14px 20px 0;
        }

            .note-box label {
                font-size: 12px;
                color: var(--muted);
                display: block;
                margin-bottom: 6px;
                font-weight: 500;
            }

            .note-box textarea {
                width: 100%;
                border: 1px solid #eee;
                border-radius: 10px;
                padding: 10px 12px;
                font-family: 'Poppins', sans-serif;
                font-size: 13px;
                resize: none;
                outline: none;
                height: 60px;
                color: var(--dark);
            }

        .order-btn {
            margin: 16px 20px 0;
            width: calc(100% - 40px);
            background: linear-gradient(135deg, #c0392b, #e74c3c);
            color: white;
            border: none;
            padding: 16px;
            border-radius: 14px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            font-family: 'Poppins', sans-serif;
            letter-spacing: 0.3px;
            box-shadow: 0 6px 20px rgba(192,57,43,0.35);
        }

        .empty-cart {
            text-align: center;
            padding: 40px 20px;
            color: var(--muted);
            font-size: 14px;
        }

            .empty-cart .ec-emoji {
                font-size: 50px;
                display: block;
                margin-bottom: 12px;
            }

        /* ── SUCCESS ── */
        .success {
            display: none;
            position: fixed;
            inset: 0;
            background: linear-gradient(135deg, #fff8f0, #fff);
            z-index: 999;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 40px 24px;
        }

            .success.show {
                display: flex;
            }

        .success-anim {
            font-size: 90px;
            animation: popIn 0.5s ease;
        }

        @keyframes popIn {
            0% {
                transform: scale(0) rotate(-10deg);
            }

            70% {
                transform: scale(1.15) rotate(3deg);
            }

            100% {
                transform: scale(1) rotate(0);
            }
        }

        .success h2 {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 38px;
            letter-spacing: 3px;
            color: var(--red);
            margin: 16px 0 8px;
        }

        .success p {
            color: var(--muted);
            font-size: 14px;
            line-height: 1.7;
        }

        .success-items {
            background: white;
            border-radius: 16px;
            padding: 16px 20px;
            margin-top: 20px;
            width: 100%;
            max-width: 340px;
            box-shadow: var(--shadow);
            text-align: left;
            border: 1px solid #f0f0f0;
        }

        .si-title {
            font-weight: 700;
            font-size: 13px;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 12px;
        }

        .si-row {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            margin-bottom: 8px;
        }

        .si-total {
            border-top: 1px dashed #eee;
            padding-top: 10px;
            margin-top: 4px;
            font-weight: 800;
            font-size: 15px;
        }

        .reset-btn {
            margin-top: 24px;
            background: var(--red);
            color: white;
            border: none;
            padding: 14px 32px;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            font-family: 'Poppins', sans-serif;
            box-shadow: 0 6px 20px rgba(192,57,43,0.3);
        }

        /* No results */
        .no-results {
            text-align: center;
            padding: 60px 20px;
            color: var(--muted);
        }

            .no-results span {
                font-size: 50px;
                display: block;
                margin-bottom: 12px;
            }

        /* Section animation */
        .section {
            animation: fadeUp 0.3s ease both;
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(12px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

            { id: 71, cat: "Coldrinks", name: "Chaas", price: 15, emoji: "🥤", color: "#d35400" },
        ];

        const CAT_EMOJI = {
            "Sandwich": "🥪", "Garlic Bread": "🍞", "Frenky": "🌯",
            "Burger": "🍔", "Sweet Bread": "🍫", "Maggi": "🍜", "Tadka Maggi": "🍜",
            "French Fries": "🍟", "Pizza": "🍕", "Pasta": "🍝", "Chaat Special": "🥘",
            "Coldrinks": "🥤"
        };
        const CAT_COLOR = {
            "Sandwich": "#c0392b", "Garlic Bread": "#27ae60", "Frenky": "#8e44ad",
            "Burger": "#e67e22", "Sweet Bread": "#2980b9", "Maggi": "#e67e22", "Tadka Maggi": "#e67e22",
            "French Fries": "#f39c12", "Pizza": "#e91e8c", "Pasta": "#9b59b6", "Chaat Special": "#d35400",
            "Coldrinks": "#1a7abf"
        };

        // ══════════════════════════════════════════
        // STATE
        // ══════════════════════════════════════════
        let cart = {};
        let activecat = "All";

        // ══════════════════════════════════════════
        // BUILD UI
        // ══════════════════════════════════════════
        function getCats() {
            return ["All", ...new Set(MENU.map(i => i.cat))];
        }

        function buildCatPills() {
            const wrap = document.getElementById("catScroll");
            wrap.innerHTML = "";
            getCats().forEach(cat => {
                const btn = document.createElement("button");
                btn.className = "cat-pill" + (cat === activecat ? " active" : "");
                const color = cat === "All" ? "#555" : CAT_COLOR[cat];
                if (cat === activecat) btn.style.background = color;
                btn.innerHTML = `<span>${cat === "All" ? "🍽️" : CAT_EMOJI[cat]}</span>${cat}`;
                btn.onclick = () => { activecat = cat; buildCatPills(); renderMenu(); };
                wrap.appendChild(btn);
            });
        }

        function renderMenu() {
            const wrap = document.getElementById("menuWrap");
            wrap.innerHTML = "";
            const q = document.getElementById("searchInput").value.toLowerCase();
            const cats = activecat === "All" ? getCats().slice(1) : [activecat];
            let found = false;

            cats.forEach(cat => {
                let items = MENU.filter(i => i.cat === cat);
                if (q) items = items.filter(i => i.name.toLowerCase().includes(q));
                if (!items.length) return;
                found = true;

                const color = CAT_COLOR[cat];
                const sec = document.createElement("div");
                sec.className = "section";

                // Section header
                const hdr = document.createElement("div");
                hdr.className = "section-header";
                hdr.style.background = color;
                hdr.innerHTML = `<span class="s-emoji">${CAT_EMOJI[cat]}</span>${cat.toUpperCase()}`;
                sec.appendChild(hdr);

                // Items
                items.forEach(item => {
                    const qty = cart[item.id] || 0;
                    const card = document.createElement("div");
                    card.className = "item-card";
                    card.innerHTML = `
                    <div class="item-left">
                      <div class="item-emoji-box" style="background:${color}18;">${item.emoji}</div>
                      <div>
                        <div class="item-name">${item.name}</div>
                        <div class="item-price" style="color:${color}">${item.price > 0 ? '₹' + item.price : 'Ask'}</div>
                      </div>
                    </div>
                    <div class="item-right">
                      ${qty === 0
                            ? `<button class="add-btn" style="background:${color}" onclick="addItem(${item.id})">+</button>`
                            : `<div class="qty-wrap">
                            <button class="qty-btn" onclick="removeItem(${item.id})">−</button>
                            <span class="qty-num">${qty}</span>
                            <button class="qty-btn" style="border-color:${color}; color:${color}" onclick="addItem(${item.id})">+</button>
                           </div>`}
                    </div>`;
                    sec.appendChild(card);
                });

                wrap.appendChild(sec);
            });

            if (!found) {
                wrap.innerHTML = `<div class="no-results"><span>🔍</span>No items found for "<strong>${q}</strong>"</div>`;
            }
        }

        // ══════════════════════════════════════════
        // CART LOGIC
        // ══════════════════════════════════════════
        function addItem(id) { cart[id] = (cart[id] || 0) + 1; refresh(); }
        function removeItem(id) {
            if (!cart[id]) return;
            cart[id]--;
            if (!cart[id]) delete cart[id];
            refresh();
        }

        function refresh() {
            const qty = Object.values(cart).reduce((a, b) => a + b, 0);
            const total = getTotal();
            document.getElementById("cbCount").textContent = `${qty} item${qty !== 1 ? "s" : ""}`;
            document.getElementById("cbTotal").textContent = `₹${total}`;
            document.getElementById("cartBar").classList.toggle("visible", qty > 0);
            renderMenu();
            if (document.getElementById("drawer").classList.contains("open")) renderDrawer();
        }

        function getTotal() {
            return Object.entries(cart).reduce((sum, [id, qty]) => {
                const item = MENU.find(i => i.id == id);
                return sum + (item ? item.price * qty : 0);
            }, 0);
        }

        function openDrawer() { renderDrawer(); document.getElementById("overlay").classList.add("show"); document.getElementById("drawer").classList.add("open"); document.body.style.overflow = "hidden"; }
        function closeDrawer() { document.getElementById("overlay").classList.remove("show"); document.getElementById("drawer").classList.remove("open"); document.body.style.overflow = ""; }

        function renderDrawer() {
            const itemsEl = document.getElementById("drawerItems");
            const billEl = document.getElementById("drawerBill");
            itemsEl.innerHTML = "";
            const entries = Object.entries(cart);

            if (!entries.length) {
                itemsEl.innerHTML = `<div class="empty-cart"><span class="ec-emoji">🛒</span>Your cart is empty<br><small>Add items from the menu</small></div>`;
                billEl.innerHTML = ""; return;
            }

            let total = 0, qty = 0;
            entries.forEach(([id, q]) => {
                const item = MENU.find(i => i.id == id);
                if (!item) return;
                const sub = item.price * q;
                total += sub; qty += q;
                itemsEl.innerHTML += `
                  <div class="cart-row">
                    <div class="cr-left">
                      <span class="cr-emoji">${item.emoji}</span>
                      <div>
                        <div class="cr-name">${item.name}</div>
                        <div class="cr-price">${item.price > 0 ? '₹' + item.price + ' each' : 'Ask for price'}</div>
                      </div>
                    </div>
                    <div class="cr-right">
                      <button class="cr-qty-btn" onclick="removeItem(${item.id})">−</button>
                      <span class="qty-num">${q}</span>
                      <button class="cr-qty-btn" onclick="addItem(${item.id})">+</button>
                      <span class="cr-sub">₹${sub}</span>
                    </div>
                  </div>`;
            });

            billEl.innerHTML = `
                <div class="bill-box">
                  <div class="bill-row"><span>${qty} item${qty !== 1 ? "s" : ""}</span><span>₹${total}</span></div>
                  <div class="bill-row total"><span>Total Amount</span><span>₹${total}</span></div>
                </div>`;
        }

        function placeOrder() {
            const entries = Object.entries(cart);
            if (!entries.length) { alert("Please add items first!"); return; }

            // Validate customer name
            const nameInput = document.getElementById("customerName");
            const customerName = nameInput.value.trim();
            if (!customerName) {
                nameInput.style.borderColor = "#c0392b";
                nameInput.style.boxShadow = "0 0 0 3px rgba(192,57,43,0.15)";
                nameInput.placeholder = "⚠️ Please enter your name!";
                nameInput.focus();
                return;
            }

            const note = document.getElementById("noteInput").value.trim();
            const total = getTotal();

            // ── Build WhatsApp message ──
            let msg = `*==== NEW ORDER - PFZ ====*\n`;
            msg += `*Customer:* ${customerName}\n`;
            msg += `*Time:* ${new Date().toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit' })}\n`;
            msg += `*-------------------------*\n`;
            entries.forEach(([id, qty]) => {
                const item = MENU.find(i => i.id == id);
                if (!item) return;
                msg += `- ${item.name} x${qty}  =  *Rs.${item.price * qty}*\n`;
            });
            msg += `*-------------------------*\n`;
            msg += `*TOTAL: Rs.${total}*\n`;
            if (note) msg += `*Note:* ${note}\n`;
            msg += `*=========================*`;

            // ── Build success screen ──
            let html = `<div class="si-title">Order Summary</div>`;
            html += `<div class="si-row"><span>👤 Name</span><span style="font-weight:700">${customerName}</span></div>`;
            entries.forEach(([id, qty]) => {
                const item = MENU.find(i => i.id == id);
                if (!item) return;
                html += `<div class="si-row"><span>${item.emoji} ${item.name} × ${qty}</span><span>₹${item.price * qty}</span></div>`;
            });
            if (note) html += `<div style="font-size:12px;color:#888;margin-top:8px;">📝 ${note}</div>`;
            html += `<div class="si-row si-total"><span>Total</span><span style="color:#c0392b">₹${total}</span></div>`;
            document.getElementById("successItems").innerHTML = html;

            closeDrawer();
            document.getElementById("successScreen").classList.add("show");

            // ── Open WhatsApp ──
            const phone = "917777976166"; // Your WhatsApp number
            const waUrl = `https://wa.me/${phone}?text=${encodeURIComponent(msg)}`;
            setTimeout(() => { window.open(waUrl, "_blank"); }, 800);
        }

        function resetAll() {
            cart = {};
            document.getElementById("noteInput").value = "";
            document.getElementById("customerName").value = "";
            document.getElementById("successScreen").classList.remove("show");
            refresh();
            window.scrollTo(0, 0);
        }

        // INIT
        buildCatPills();
        renderMenu();
    </script>
